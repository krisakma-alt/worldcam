<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldCam — 지금 세계는</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0a0f;
  --paper: #f5f0e8;
  --sepia: #c8a96e;
  --rust: #b85c38;
  --fog: #8a8a9a;
  --glass: rgba(245,240,232,0.06);
  --green: #4caf7d;
  --blue: #5b9bd5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--ink);
  color: var(--paper);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.4;
}
.layout {
  position:relative; z-index:1;
  max-width:1200px; margin:0 auto;
  padding:0 1.5rem;
}
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:1.2rem 0; border-bottom:1px solid rgba(200,169,110,0.2);
}
.logo {
  font-family:'Playfair Display', serif;
  font-size:1.5rem; letter-spacing:0.05em;
  color:var(--sepia);
}
.logo span { color:var(--paper); font-style:italic; }
.slideshow-btn {
  background:none; border:1px solid var(--fog);
  color:var(--fog); padding:0.3rem 0.8rem;
  font-family:'DM Mono',monospace; font-size:0.65rem;
  cursor:pointer; transition:all 0.2s; border-radius:2px;
}
.slideshow-btn.active { border-color:var(--green); color:var(--green); }
.slideshow-btn:hover { border-color:var(--paper); color:var(--paper); }
.search-section { padding:1rem 0 0.5rem; }
.search-row { display:flex; gap:0.5rem; }
.search-input {
  flex:1; background:var(--glass);
  border:1px solid rgba(200,169,110,0.3);
  color:var(--paper); padding:0.6rem 1rem;
  font-family:'DM Mono',monospace; font-size:0.8rem;
  border-radius:2px; outline:none;
  transition:border-color 0.2s;
}
.search-input:focus { border-color:var(--sepia); }
.search-input::placeholder { color:var(--fog); }
.btn {
  background:none; border:1px solid var(--sepia);
  color:var(--sepia); padding:0.6rem 1.2rem;
  font-family:'DM Mono',monospace; font-size:0.75rem;
  cursor:pointer; transition:all 0.2s; border-radius:2px;
  white-space:nowrap;
}
.btn:hover { background:var(--sepia); color:var(--ink); }
.btn.primary { background:var(--sepia); color:var(--ink); }
.btn.primary:hover { background:var(--paper); }
.btn.random { border-color:var(--rust); color:var(--rust); }
.btn.random:hover { background:var(--rust); color:var(--paper); }
.region-row {
  display:flex; gap:0.4rem; flex-wrap:wrap;
  padding:0.5rem 0; min-height:1.8rem;
}
.region-chip {
  background:none; border:1px solid rgba(91,155,213,0.4);
  color:var(--blue); padding:0.2rem 0.7rem;
  font-family:'DM Mono',monospace; font-size:0.65rem;
  cursor:pointer; transition:all 0.2s; border-radius:20px;
}
.region-chip:hover, .region-chip.active {
  background:var(--blue); color:var(--ink);
}
.popular-label { font-size:0.6rem; color:var(--fog); padding:0.2rem 0 0.4rem; }
.popular-row {
  display:flex; gap:0.4rem; flex-wrap:wrap;
  padding-bottom:0.8rem;
}
.pop-chip {
  background:none; border:1px solid rgba(200,169,110,0.25);
  color:var(--fog); padding:0.2rem 0.7rem;
  font-family:'DM Mono',monospace; font-size:0.65rem;
  cursor:pointer; transition:all 0.2s; border-radius:2px;
}
.pop-chip:hover { border-color:var(--sepia); color:var(--sepia); }
.main-grid {
  display:grid;
  grid-template-columns:1fr 280px;
  gap:1.2rem;
  padding-bottom:2rem;
}
@media(max-width:768px){
  .main-grid { grid-template-columns:1fr; }
  .side-panel { order: -1; }
}
.cam-frame {
  position:relative;
  background:#111;
  border:1px solid rgba(200,169,110,0.15);
  border-radius:2px; overflow:hidden;
  aspect-ratio:16/9;
}
.cam-frame img {
  width:100%; height:100%;
  border:none; display:block;
  object-fit:cover;
}
.cam-overlay {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent, rgba(10,10,15,0.9));
  padding:1.5rem 1rem 0.8rem;
  pointer-events:none;
}
.cam-title { font-size:0.85rem; color:var(--paper); margin-bottom:0.2rem; }
.cam-location { font-size:0.65rem; color:var(--sepia); }
.cam-status {
  display:flex; align-items:center; gap:0.4rem;
  font-size:0.65rem; color:var(--fog); padding:0.3rem 0;
}
.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--green); box-shadow:0 0 6px var(--green);
  animation:pulse 2s infinite; flex-shrink:0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.no-cam {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100%; gap:0.5rem;
  color:var(--fog); font-size:0.75rem; text-align:center; padding:1rem;
}
.loading-overlay {
  position:absolute; inset:0;
  background:rgba(10,10,15,0.85);
  display:flex; align-items:center; justify-content:center;
  z-index:10;
}
.spinner {
  width:30px; height:30px;
  border:2px solid rgba(200,169,110,0.2);
  border-top-color:var(--sepia);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.4rem 0; font-size:0.62rem; color:var(--fog);
  border-top:1px solid rgba(200,169,110,0.1);
}
.progress-bar {
  height:2px; background:rgba(200,169,110,0.15);
  border-radius:1px; overflow:hidden;
}
.progress-fill {
  height:100%; background:var(--sepia);
  transition:width 1s linear; width:0%;
}
.side-panel { display:flex; flex-direction:column; gap:0.8rem; }
.panel-card {
  background:var(--glass);
  border:1px solid rgba(200,169,110,0.12);
  border-radius:2px; padding:0.8rem;
}
.panel-title {
  font-size:0.6rem; color:var(--sepia);
  letter-spacing:0.1em; text-transform:uppercase;
  margin-bottom:0.6rem; padding-bottom:0.4rem;
  border-bottom:1px solid rgba(200,169,110,0.15);
}
.weather-main { display:flex; align-items:center; gap:0.8rem; }
.weather-icon { font-size:2rem; line-height:1; }
.weather-temp { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--paper); }
.weather-desc { font-size:0.65rem; color:var(--fog); margin-top:0.1rem; }
.weather-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:0.3rem; margin-top:0.6rem;
}
.weather-item { font-size:0.62rem; color:var(--fog); }
.weather-item span { color:var(--paper); }
.local-time {
  font-family:'Playfair Display',serif;
  font-size:1.6rem; color:var(--sepia);
  letter-spacing:0.05em;
}
.local-date { font-size:0.62rem; color:var(--fog); margin-top:0.2rem; }
.cam-list { display:flex; flex-direction:column; gap:0.3rem; max-height:160px; overflow-y:auto; }
.cam-list::-webkit-scrollbar { width:3px; }
.cam-list::-webkit-scrollbar-thumb { background:var(--fog); border-radius:2px; }
.cam-item {
  padding:0.35rem 0.5rem; cursor:pointer;
  border-radius:2px; transition:background 0.15s;
  font-size:0.65rem; color:var(--fog);
  border-left:2px solid transparent;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.cam-item:hover { background:rgba(200,169,110,0.08); color:var(--paper); }
.cam-item.active { border-left-color:var(--sepia); color:var(--paper); background:rgba(200,169,110,0.06); }
.fav-list { display:flex; flex-direction:column; gap:0.3rem; max-height:120px; overflow-y:auto; }
.fav-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.3rem 0.4rem; cursor:pointer;
  font-size:0.65rem; color:var(--fog);
  border-radius:2px; transition:background 0.15s;
}
.fav-item:hover { background:rgba(200,169,110,0.08); }
.fav-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fav-name:hover { color:var(--paper); }
.fav-del {
  background:none; border:none; color:var(--fog);
  cursor:pointer; font-size:0.7rem; padding:0 0.2rem;
  flex-shrink:0;
}
.fav-del:hover { color:var(--rust); }
.fav-empty { font-size:0.65rem; color:var(--fog); text-align:center; padding:0.5rem 0; }
.fav-btn {
  background:none; border:1px solid rgba(200,169,110,0.3);
  color:var(--fog); padding:0.35rem 0.6rem;
  font-size:0.7rem; cursor:pointer;
  transition:all 0.2s; border-radius:2px;
}
.fav-btn:hover, .fav-btn.active { border-color:var(--sepia); color:var(--sepia); }
.checklist { display:flex; flex-direction:column; gap:0.35rem; }
.check-item { display:flex; align-items:flex-start; gap:0.4rem; font-size:0.65rem; }
.check-item input[type=checkbox] { margin-top:2px; accent-color:var(--sepia); flex-shrink:0; }
.check-item label { color:var(--fog); cursor:pointer; line-height:1.4; }
.check-item input:checked + label { text-decoration:line-through; opacity:0.4; }
.toast {
  position:fixed; bottom:2rem; right:2rem;
  background:var(--sepia); color:var(--ink);
  padding:0.5rem 1rem; font-size:0.7rem;
  border-radius:2px; z-index:100;
  opacity:0; transform:translateY(10px);
  transition:all 0.3s; pointer-events:none;
}
.toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>
<div class="layout">
  <header>
    <div class="logo">World<span>Cam</span></div>
    <button class="slideshow-btn" id="slideshowBtn" onclick="toggleSlideshow()">▷ 슬라이드쇼</button>
  </header>

  <div class="search-section">
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text"
        placeholder="나라 입력 (한국, Japan, France, USA...)"
        onkeydown="if(event.key==='Enter') searchCountry()">
      <button class="btn primary" onclick="searchCountry()">검색</button>
      <button class="btn random" onclick="loadRandom()">🎲 랜덤</button>
    </div>
    <div class="region-row" id="regionRow"></div>
    <div class="popular-label">인기 여행지 바로가기</div>
    <div class="popular-row" id="popularRow"></div>
  </div>

  <div class="main-grid">
    <div>
      <div class="cam-frame" id="camFrame">
        <div class="no-cam" id="noCam">
          <div style="font-size:2.5rem">🌍</div>
          <div>나라를 검색하거나 랜덤 버튼을 눌러보세요</div>
          <div style="font-size:0.6rem;margin-top:0.3rem;opacity:0.6">← → 키보드로 카메라 전환 · Space로 슬라이드쇼</div>
        </div>
        <div class="loading-overlay" id="loadingOverlay" style="display:none">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="cam-status" id="camStatus" style="display:none">
        <div class="live-dot"></div>
        <span id="camStatusText"></span>
      </div>
      <div class="status-bar" id="statusBar" style="display:none">
        <span id="statusText">슬라이드쇼</span>
        <span id="statusTimer"></span>
      </div>
      <div class="progress-bar" id="progressBar" style="display:none">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel-card" id="weatherCard" style="display:none">
        <div class="panel-title">현지 날씨</div>
        <div class="weather-main">
          <div class="weather-icon" id="wIcon">☁️</div>
          <div>
            <div class="weather-temp" id="wTemp">--°</div>
            <div class="weather-desc" id="wDesc">--</div>
          </div>
        </div>
        <div class="weather-grid">
          <div class="weather-item">습도 <span id="wHumid">--%</span></div>
          <div class="weather-item">바람 <span id="wWind">--</span></div>
          <div class="weather-item">체감 <span id="wFeel">--°</span></div>
          <div class="weather-item">시정 <span id="wVis">--</span></div>
        </div>
      </div>

      <div class="panel-card" id="timeCard" style="display:none">
        <div class="panel-title">현지 시간</div>
        <div class="local-time" id="localTime">--:--:--</div>
        <div class="local-date" id="localDate"></div>
      </div>

      <div class="panel-card" id="camListCard" style="display:none">
        <div class="panel-title" id="camListTitle">카메라 목록</div>
        <div class="cam-list" id="camList"></div>
        <div style="display:flex;gap:0.4rem;margin-top:0.6rem;">
          <button class="btn" style="flex:1;padding:0.35rem;font-size:0.65rem" onclick="prevCam()">◀</button>
          <button class="fav-btn" id="favBtn" onclick="toggleFav()">☆</button>
          <button class="btn" style="flex:1;padding:0.35rem;font-size:0.65rem" onclick="nextCam()">▶</button>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title">즐겨찾기</div>
        <div class="fav-list" id="favList"></div>
      </div>

      <div class="panel-card" id="checklistCard" style="display:none">
        <div class="panel-title">여행 전 체크리스트</div>
        <div class="checklist" id="checklist"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

function searchCountry(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q)return;
  let k=null;
  if(COUNTRIES[q])k=q;
  else if(EN_MAP[q])k=EN_MAP[q];
  else for(const ck of Object.keys(COUNTRIES)){if(ck.includes(q)||COUNTRIES[ck].en.toLowerCase().includes(q)){k=ck;break;}}
  if(!k){showToast('나라를 찾을 수 없습니다');return;}
  loadCountry(k);
}

function loadCountry(k,rk){
  const c=COUNTRIES[k];if(!c)return;
  S.countryKey=k;
  const rr=document.getElementById('regionRow');
  if(c.regions){
    rr.innerHTML=Object.keys(c.regions).map(r=>`<button class="region-chip${r===rk?' active':''}" onclick="loadCountry('${k}','${r}')">${r}</button>`).join('');
  } else rr.innerHTML='';
  let spots;
  if(c.regions){
    if(rk&&c.regions[rk])spots=c.regions[rk];
    else{const keys=Object.keys(c.regions);const picked=keys[Math.floor(Math.random()*keys.length)];spots=c.regions[picked];rr.querySelectorAll('.region-chip').forEach(b=>b.classList.toggle('active',b.textContent===picked));}
  } else spots=c.spots;
  const spot=spots[Math.floor(Math.random()*spots.length)];
  fetchCams(spot.lat,spot.lng,spot.name,k);
  loadChecklist(c.cl||'europe');
}

function loadSpot(k,name,lat,lng){
  S.countryKey=k;
  document.getElementById('regionRow').innerHTML='';
  fetchCams(lat,lng,name,k);
  const c=COUNTRIES[k];if(c)loadChecklist(c.cl||'europe');
}

function loadRandom(){
  const keys=Object.keys(COUNTRIES);
  loadCountry(keys[Math.floor(Math.random()*keys.length)]);
}

async function fetchCams(lat,lng,name,k){
  setLoading(true);
  S.lat=lat;S.lng=lng;S.name=name;
  try{
    const r=await fetch(`${WORKER}?lat=${lat}&lng=${lng}&radius=250&limit=20`);
    const d=await r.json();
    const cams=(d.result&&d.result.webcams)||[];
    setLoading(false);
    if(!cams.length){noCamState(name,k);return;}
    S.cams=cams;S.idx=0;
    renderCamList();showCam(0);
    fetchWeather(lat,lng);
    document.getElementById('camListCard').style.display='';
  }catch(e){setLoading(false);showToast('오류가 발생했습니다');console.error(e);}
}

function noCamState(name,k){
  const f=document.getElementById('camFrame');
  f.innerHTML=`<div class="no-cam"><div style="font-size:2rem">${COUNTRIES[k]?.flag||'📷'}</div><div>${name} 주변에 카메라가 없습니다</div><button class="btn" style="margin-top:0.8rem;font-size:0.65rem" onclick="loadCountry('${k}')">다른 장소 시도</button></div>`;
  document.getElementById('camStatus').style.display='none';
  document.getElementById('camListCard').style.display='none';
  fetchWeather(S.lat,S.lng);
}

function renderCamList(){
  const c=COUNTRIES[S.countryKey];
  document.getElementById('camListTitle').textContent=`${c?.flag||''} ${c?.en||''} · ${S.cams.length}개`;
  document.getElementById('camList').innerHTML=S.cams.map((cam,i)=>`<div class="cam-item${i===S.idx?' active':''}" id="ci${i}" onclick="showCam(${i})">${cam.title||'이름 없음'}</div>`).join('');
}

function showCam(i){
  if(i<0||i>=S.cams.length)return;
  S.idx=i;
  const cam=S.cams[i];
  const img=cam.images?.current?.preview||cam.images?.daylight?.preview||'';
  const f=document.getElementById('camFrame');
  f.innerHTML=(img?`<img src="${img}" alt="${cam.title||''}" loading="lazy">`:`<div class="no-cam"><div style="font-size:2rem">📷</div><div>이미지 없음</div></div>`)+`<div class="cam-overlay"><div class="cam-title">${cam.title||'카메라'}</div><div class="cam-location">${cam.location?.city||''} ${cam.location?.country||''}</div></div>`;
  document.getElementById('camStatus').style.display='flex';
  document.getElementById('camStatusText').textContent=`${cam.title||'카메라'} · ${i+1}/${S.cams.length}`;
  const fb=document.getElementById('favBtn');
  const isFav=S.favs.some(f=>f.id===cam.id);
  fb.textContent=isFav?'★':'☆';fb.classList.toggle('active',isFav);
  document.querySelectorAll('.cam-item').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.getElementById(`ci${i}`)?.scrollIntoView({block:'nearest'});
}

function nextCam(){showCam((S.idx+1)%S.cams.length);}
function prevCam(){showCam((S.idx-1+S.cams.length)%S.cams.length);}

function setLoading(v){
  const lo=document.getElementById('loadingOverlay');
  if(lo)lo.style.display=v?'flex':'none';
}

async function fetchWeather(lat,lng){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,visibility&wind_speed_unit=ms&timezone=auto`);
    const d=await r.json();const c=d.current;if(!c)return;
    const w=WMO[c.weather_code]||'🌡 알 수 없음';
    const parts=w.split(' ');const icon=parts[0];const desc=parts.slice(1).join(' ');
    document.getElementById('wIcon').textContent=icon;
    document.getElementById('wTemp').textContent=`${Math.round(c.temperature_2m)}°`;
    document.getElementById('wDesc').textContent=desc;
    document.getElementById('wHumid').textContent=`${c.relative_humidity_2m}%`;
    document.getElementById('wWind').textContent=`${c.wind_speed_10m} m/s`;
    document.getElementById('wFeel').textContent=`${Math.round(c.apparent_temperature)}°`;
    document.getElementById('wVis').textContent=`${Math.round((c.visibility||0)/1000)} km`;
    document.getElementById('weatherCard').style.display='';
    S.tz=d.timezone||'UTC';
    startClock();
  }catch(e){console.warn(e);}
}

function startClock(){
  if(S.clockInterval)clearInterval(S.clockInterval);
  S.clockInterval=setInterval(tick,1000);tick();
  document.getElementById('timeCard').style.display='';
}
function tick(){
  try{
    const now=new Date();
    document.getElementById('localTime').textContent=now.toLocaleTimeString('ko-KR',{timeZone:S.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    document.getElementById('localDate').textContent=S.tz.replace(/_/g,' ')+' · '+now.toLocaleDateString('ko-KR',{timeZone:S.tz,year:'numeric',month:'long',day:'numeric',weekday:'short'});
  }catch(e){}
}

function toggleFav(){
  if(!S.cams.length)return;
  const cam=S.cams[S.idx];
  const i=S.favs.findIndex(f=>f.id===cam.id);
  if(i===-1){S.favs.push({id:cam.id,title:cam.title,countryKey:S.countryKey,lat:S.lat,lng:S.lng});showToast('즐겨찾기 추가 ★');}
  else{S.favs.splice(i,1);showToast('즐겨찾기 제거');}
  localStorage.setItem('wc_favs',JSON.stringify(S.favs));
  renderFavs();showCam(S.idx);
}
function renderFavs(){
  const el=document.getElementById('favList');
  if(!S.favs.length){el.innerHTML='<div class="fav-empty">즐겨찾기 없음</div>';return;}
  el.innerHTML=S.favs.map((f,i)=>`<div class="fav-item"><span class="fav-name" onclick="loadFav(${i})">${COUNTRIES[f.countryKey]?.flag||''} ${f.title}</span><button class="fav-del" onclick="delFav(${i})">✕</button></div>`).join('');
}
function loadFav(i){const f=S.favs[i];if(f)fetchCams(f.lat,f.lng,f.title,f.countryKey);}
function delFav(i){S.favs.splice(i,1);localStorage.setItem('wc_favs',JSON.stringify(S.favs));renderFavs();}

function loadChecklist(key){
  const items=CHECKLISTS[key]||CHECKLISTS.europe;
  document.getElementById('checklist').innerHTML=items.map((it,i)=>`<div class="check-item"><input type="checkbox" id="ck${i}"><label for="ck${i}">${it}</label></div>`).join('');
  document.getElementById('checklistCard').style.display='';
}

function toggleSlideshow(){S.sliding?stopSlide():startSlide();}
function startSlide(){
  if(!S.cams.length){showToast('먼저 카메라를 검색하세요');return;}
  S.sliding=true;
  const btn=document.getElementById('slideshowBtn');btn.textContent='⏸ 슬라이드 중';btn.classList.add('active');
  document.getElementById('statusBar').style.display='flex';
  document.getElementById('progressBar').style.display='';
  document.getElementById('statusText').textContent='30초 자동 전환';
  startPBar();
  S.slideshowTimer=setInterval(()=>{nextCam();resetPBar();},30000);
}
function stopSlide(){
  S.sliding=false;clearInterval(S.slideshowTimer);clearInterval(S.progressTimer);
  const btn=document.getElementById('slideshowBtn');btn.textContent='▷ 슬라이드쇼';btn.classList.remove('active');
  document.getElementById('statusBar').style.display='none';
  document.getElementById('progressBar').style.display='none';
  document.getElementById('progressFill').style.width='0%';
}
let _elapsed=0;
function startPBar(){
  _elapsed=0;document.getElementById('progressFill').style.width='0%';
  S.progressTimer=setInterval(()=>{
    _elapsed+=1000;
    const p=Math.min(_elapsed/30000*100,100);
    document.getElementById('progressFill').style.width=p+'%';
    document.getElementById('statusTimer').textContent=`${Math.ceil((30000-_elapsed)/1000)}초 후 다음`;
  },1000);
}
function resetPBar(){clearInterval(S.progressTimer);startPBar();}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight')nextCam();
  if(e.key==='ArrowLeft')prevCam();
  if(e.key===' '){e.preventDefault();toggleSlideshow();}
});
</script>
</body>
</html>
